services:
  # Backend FastAPI Service (Render)
  - type: web
    name: cyberdude-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootContext: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ALLOWED_ORIGINS
        value: "*" # Set this to your Vercel URL in Render dashboard for better security
      - key: DEBUG
        value: "false"
